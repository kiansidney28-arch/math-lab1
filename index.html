<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>EJU Math Mastery | Elsa Visual Laboratory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&family=Noto+Sans+JP:wght@300;500;700&display=swap');
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; color: #fff; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: linear-gradient(to bottom, #3b6b7a, #6b8e98); }
        #bg-watermark { position: fixed; top: 52%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 2; pointer-events: none; }
        .bg-line { font-weight: 900; font-style: italic; line-height: 0.82; color: rgba(255, 255, 255, 0.07); text-transform: uppercase; }
        #bg-elsa { font-size: 21vw; letter-spacing: -10px; }
        #bg-math { font-size: 8.8vw; letter-spacing: 4px; margin-top: -10px; }
        #sidebar { position: absolute; left: 40px; top: 40px; bottom: 120px; width: 330px; z-index: 100; overflow-y: auto; padding-right: 10px; }
        .sidebar-section { margin-bottom: 10px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .section-header { padding: 15px 20px; cursor: pointer; font-size: 0.72rem; font-weight: 800; display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); }
        .section-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .sidebar-section.active .section-content { max-height: 1000px; }
        .nav-item { padding: 10px 25px; cursor: pointer; font-size: 0.8rem; color: rgba(255,255,255,0.45); transition: 0.2s; border-top: 1px solid rgba(255,255,255,0.02); }
        .nav-item.active { color: #f6bd60; font-weight: 600; border-left: 4px solid #f6bd60; background: rgba(255,255,255,0.05); }
        #right-panel { position: absolute; right: 60px; top: 60px; width: 500px; display: flex; flex-direction: column; align-items: flex-end; z-index: 100; }
        #m-formula-display { font-size: 2.5rem; color: #fff; min-height: 130px; text-align: right; text-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #drawer-container { width: 100%; background: rgba(255,255,255,0.12); backdrop-filter: blur(25px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; transition: max-height 0.4s ease; max-height: 55px; }
        #drawer-container.open { max-height: 750px; }
        #drawer-handle { padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; font-size: 0.9rem; }
        #drawer-content { padding: 0 25px 30px 25px; color: rgba(255,255,255,0.95); font-size: 0.85rem; line-height: 1.8; }
        .hl-p { color: #f6bd60; font-weight: 700; margin-top: 15px; display: block; }
        .hl-t { color: #ff7675; font-weight: 700; margin-top: 10px; display: block; border-left: 3px solid #ff7675; padding-left: 10px; }
        #controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 500px; display: flex; align-items: center; gap: 20px; z-index: 100; }
        input[type=range] { flex-grow: 1; accent-color: #fff; cursor: pointer; height: 2px; }
        .play-btn { background: #fff; border: none; color: #3b6b7a; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #sidebar::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="bg-watermark"><div class="bg-line" id="bg-elsa">ELSA</div><div class="bg-line" id="bg-math">MATHEMATICS</div></div>
<div id="ui-wrapper">
    <div id="sidebar"></div>
    <div id="right-panel">
        <div id="m-formula-display"></div>
        <div id="drawer-container">
            <div id="drawer-handle" onclick="toggleDrawer()"><span id="ui-title">幾何本質與留考重點</span><span>▿</span></div>
            <div id="drawer-content"></div>
        </div>
    </div>
    <div id="controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">II</button>
        <input type="range" id="progress-slider" min="0" max="1000" value="0" oninput="manualSeek(this.value)">
        <span id="percent" style="font-weight:bold; width:50px; text-align:right;">0%</span>
    </div>
</div>
<script>
    let scene, camera, renderer, controls, pivot, currentMesh;
    let progress = 0.01, isPaused = false, isWaiting = false, currentLang = 'zh-hant', curC = 0, curI = 0;
    const SPEED = 0.0035;

    // --- EJU 數學全考綱數據庫 (全手動填寫) ---
    const mathLibrary = [
        { cat: { 'zh-hant': "I. 數與式 (Expansions)", 'ja': "数と式" }, items: [
            { t: { 'zh-hant': "絕對值：距離摺疊", 'ja': "絶対値と折れ線" }, f: "y = |x - a|", d: { 'zh-hant': "<span class='hl-p'>本質：</span>點與點的距離。3D展示圖像在臨界點處翻轉。<br><span class='hl-t'>易錯點：</span>含有文字參數時討論不全。", 'ja': "場合分けの境界点に注意。" }, g: (p) => {
                const pts = [new THREE.Vector3(-5,5*p,0), new THREE.Vector3(0,0,0), new THREE.Vector3(5,5*p,0)];
                return new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 64, 0.15, 8, false);
            }}
        ]},
        { cat: { 'zh-hant': "II. 二次函數 (Quadratic)", 'ja': "二次関数" }, items: [
            { t: { 'zh-hant': "動軸問題最大最小", 'ja': "動軸の最大・最小" }, f: "y = a(x-p)^2+q", d: { 'zh-hant': "<span class='hl-p'>本質：</span>對稱軸與定義域相對位置。3D展示拋物線生成。<br><span class='hl-t'>易錯點：</span>求最大值必看區間中點。", 'ja': "軸 $p$ と範囲の中点との比較が必須。" }, g: (p) => {
                const pts = []; for(let x=-4; x<=4; x+=0.1) if(Math.abs(x)<p*4.5) pts.push(new THREE.Vector3(x, x*x*0.3, 0));
                return new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts.length>1?pts:[new THREE.Vector3(0,0,0),new THREE.Vector3(0,0.1,0)]), 64, 0.12, 8, false);
            }},
            { t: { 'zh-hant': "判別式與 X 軸位置", 'ja': "判別式 D" }, f: "D = b^2 - 4ac", d: { 'zh-hant': "D 決定交點數量。3D 展示圓環與橫軸的接觸點。", 'ja': "Dの符号で共有点の個数が決まる。" }, g: (p) => new THREE.TorusGeometry(2, 0.5 * p, 16, 64) }
        ]},
        { cat: { 'zh-hant': "III. 三角比 (Course 1)", 'ja': "図形と計量" }, items: [
            { t: { 'zh-hant': "正弦定理精確比例", 'ja': "正弦定理" }, f: "\\frac{a}{\\sin A} = 2R", d: { 'zh-hant': "<span class='hl-p'>幾何含義：</span>三角形頂點精確落在半徑為 R 的圓上。3D展示邊長 $a$ 隨角度變化的精確比例。", 'ja': "三角形が外接円 $2R$ に内接する様子を示します。" }, g: (p) => {
                const gr = new THREE.Group();
                const circle = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.04, 16, 100, Math.PI*2*p), new THREE.MeshBasicMaterial({color:0xf6bd60}));
                gr.add(circle);
                const a = 2*Math.PI*0.1, b = 2*Math.PI*0.4, c = 2*Math.PI*0.7; // 精確夾角
                const v1 = new THREE.Vector3(Math.cos(a)*2.5, Math.sin(a)*2.5, 0);
                const v2 = new THREE.Vector3(Math.cos(b)*2.5, Math.sin(b)*2.5, 0);
                const v3 = new THREE.Vector3(Math.cos(c)*2.5, Math.sin(c)*2.5, 0);
                if(p>0.8) {
                    const tri = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3([v1,v2,v3,v1]), 32, 0.1, 8, false), new THREE.MeshBasicMaterial({color:0xffffff}));
                    gr.add(tri);
                }
                return gr;
            }}
        ]},
        { cat: { 'zh-hant': "IV. 指數與對數 (II)", 'ja': "指数・対数関数" }, items: [
            { t: { 'zh-hant': "對數不等式方向", 'ja': "対数不等式" }, f: "\\log_a x > \\log_a y \\iff x < y \\, (a < 1)", d: { 'zh-hant': "<span class='hl-t'>重點：</span>底數小於 1 時不等號方向反轉。", 'ja': "真数条件 $x>0$ を忘れずに。" }, g: (p) => {
                const pts=[]; for(let i=0.1; i<6; i+=0.1) if(i<p*6) pts.push(new THREE.Vector3(i-3, Math.log2(i), 0));
                return new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts.length>1?pts:[new THREE.Vector3(0,0,0),new THREE.Vector3(0,0.1,0)]), 64, 0.1, 8, false);
            }}
        ]},
        { cat: { 'zh-hant': "V. 數列 (B)", 'ja': "数列" }, items: [
            { t: { 'zh-hant': "等比級數螺旋和", 'ja': "等比数列の和" }, f: "S_n = \\frac{a(r^n-1)}{r-1}", d: { 'zh-hant': "複利效應與收斂。3D螺旋體現增長規律。", 'ja': "項数 $n$ の判定ミスに注意。" }, g: (p) => new THREE.TorusKnotGeometry(1.8, 0.4*p, 128, 16, 2, 3) }
        ]},
        { cat: { 'zh-hant': "VI. 向量 (B)", 'ja': "ベクトル" }, items: [
            { t: { 'zh-hant': "內積與空間夾角", 'ja': "ベクトルの内積" }, f: "\\vec{a} \\cdot \\vec{b} = |a||b|\\cos\\theta", d: { 'zh-hant': "垂直則內積為 0。3D掃描夾角範圍。", 'ja': "垂直条件は内積0。" }, g: (p) => new THREE.TorusGeometry(2, 0.1, 16, 100, Math.PI*2*p) }
        ]},
        { cat: { 'zh-hant': "VII. 微積分 (Course 2)", 'ja': "微分積分" }, items: [
            { t: { 'zh-hant': "旋轉體：圓盤累積", 'ja': "回転体の体積" }, f: "V = \\pi \\int y^2 dx", d: { 'zh-hant': "<span class='hl-p'>幾何含義：</span>無數圓盤疊加。3D展示體積掃描。", 'ja': "微小円盤の累積を示します。" }, g: (p) => {
                const gr = new THREE.Group();
                for(let i=0; i<p*20; i++){
                    const r = 1 + Math.sin(i/4);
                    const d = new THREE.Mesh(new THREE.CylinderGeometry(r,r,0.1,32), new THREE.MeshStandardMaterial({color:0x84a59d}));
                    d.position.y = i*0.2 - 2; gr.add(d);
                }
                return gr;
            }}
        ]},
        { cat: { 'zh-hant': "VIII. 複數平面 (理科)", 'ja': "複素数平面" }, items: [
            { t: { 'zh-hant': "棣美弗：旋轉變換", 'ja': "ド・モアブルの定理" }, f: "z^n = r^n e^{in\\theta}", d: { 'zh-hant': "複數冪次代表長度冪倍與角度累加。", 'ja': "冪乗による空間内のスパイラル。" }, g: (p) => {
                const pts=[]; for(let i=0; i<p*Math.PI*6; i+=0.1) pts.push(new THREE.Vector3(Math.pow(1.04, i)*Math.cos(i), i/10-2, Math.pow(1.04, i)*Math.sin(i)));
                return new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 128, 0.1, 8, false);
            }}
        ]}
    ];

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(13, 11, 13);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));
        const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 15, 10); scene.add(sun);
        const axMat = new THREE.LineBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.65});
        const axG = new THREE.Group();
        axG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-15,0,0),new THREE.Vector3(15,0,0)]), axMat));
        axG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-15,0),new THREE.Vector3(0,15,0)]), axMat));
        axG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-15),new THREE.Vector3(0,0,15)]), axMat));
        const grid = new THREE.GridHelper(30, 30, 0xffffff, 0xffffff); grid.material.opacity = 0.2; grid.material.transparent = true;
        axG.add(grid); scene.add(axG);
        pivot = new THREE.Group(); scene.add(pivot);
        renderSidebar(); load(0, 0); animate();
    }

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar'); sidebar.innerHTML = '';
        mathLibrary.forEach((cat, cIdx) => {
            const section = document.createElement('div');
            section.className = `sidebar-section ${cIdx === curC ? 'active' : ''}`;
            section.innerHTML = `<div class="section-header" onclick="this.parentElement.classList.toggle('active')"><span>${cat.cat[currentLang]}</span><span>▿</span></div>`;
            const content = document.createElement('div');
            content.className = 'section-content';
            cat.items.forEach((item, iIdx) => {
                const nav = document.createElement('div');
                nav.className = `nav-item ${cIdx === curC && iIdx === curI ? 'active' : ''}`;
                nav.innerText = item.t[currentLang];
                nav.onclick = () => load(cIdx, iIdx);
                content.appendChild(nav);
            });
            section.appendChild(content); sidebar.appendChild(section);
        });
    }

    function load(cIdx, iIdx) {
        curC = cIdx; curI = iIdx; progress = 0.01; isWaiting = false;
        renderSidebar();
        const item = mathLibrary[cIdx].items[iIdx];
        document.getElementById('drawer-content').innerHTML = `<strong>${item.t[currentLang]}</strong><p>${item.d[currentLang]}</p>`;
        document.getElementById('m-formula-display').innerHTML = `\\[ ${item.f} \\]`;
        if (window.MathJax) MathJax.typesetPromise();
        updateMesh();
    }

    function updateMesh() {
        if (currentMesh) pivot.remove(currentMesh);
        const item = mathLibrary[curC].items[curI];
        const res = item.g(progress);
        const color = [0xe29578, 0xf6bd60, 0x84a59d, 0xe5989b, 0xb5838d][(curC+curI)%5];
        if (res instanceof THREE.Group) {
            currentMesh = res;
        } else {
            currentMesh = new THREE.Mesh(res, new THREE.MeshStandardMaterial({ color: color, roughness: 0.12, metalness: 0.05, side: THREE.DoubleSide }));
        }
        pivot.add(currentMesh);
        document.getElementById('progress-slider').value = progress * 1000;
        document.getElementById('percent').innerText = Math.floor(progress * 100) + "%";
    }

    function togglePlay() { isPaused = !isPaused; document.getElementById('play-btn').innerText = isPaused ? "▶" : "II"; }
    function manualSeek(val) { progress = Math.max(0.01, val / 1000); isPaused = true; isWaiting = false; updateMesh(); }
    function toggleDrawer() { document.getElementById('drawer-container').classList.toggle('open'); }
    function toggleLang() { currentLang = (currentLang === 'zh-hant' ? 'ja' : 'zh-hant'); renderSidebar(); load(curC, curI); }

    function animate() {
        requestAnimationFrame(animate);
        if (!isPaused && !isWaiting) {
            progress += SPEED;
            if (progress >= 1) { progress = 1; isWaiting = true; setTimeout(() => { if (isWaiting) { progress = 0.01; isWaiting = false; } }, 5000); }
            updateMesh();
        }
        pivot.position.y = Math.sin(Date.now() * 0.001) * 0.35;
        pivot.rotation.y += 0.004;
        controls.update(); renderer.render(scene, camera);
    }
    window.onload = init;
</script>
</body>
</html>
